<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vladimir Golub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/svg+xml" href="icons/brush-2.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="#" id="site-title">Vladimir Golub</a>
        <div class="ms-auto d-flex align-items-center">
            <select class="form-select form-select-sm border-0 bg-light me-2" id="lang-select" style="width: auto; cursor: pointer;">
                <option value="be">BE</option>
                <option value="ru">RU</option>
                <option value="lt">LT</option>
                <option value="en" selected>EN</option>
            </select>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="#about" data-t="nav_about">About</a></li>
                <li class="nav-item"><a class="nav-link" href="#paintings" data-t="nav_paintings">Paintings</a></li>
                <li class="nav-item"><a class="nav-link" href="#sculptures" data-t="nav_sculptures">Sculptures</a></li>
                <li class="nav-item"><a class="nav-link" href="#exhibitions" data-t="nav_exhibitions">Exhibitions</a></li>
                <li class="nav-item"><a class="nav-link" href="#awards" data-t="nav_awards">Awards</a></li>
                <li class="nav-item"><a class="nav-link" href="#contacts" data-t="nav_contacts">Contacts</a></li>
            </ul>
        </div>
    </div>
</nav>

<section id="about" class="py-5">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-auto about-img-container">
                <img src="https://res.cloudinary.com/dki455vp/image/upload/photo.jpg" class="image profile-pic" />
            </div>
            <div class="col">
                <div class="card yellow-card">
                    <div class="card-body">
                        <h2 class="title" data-t="about_title">About me</h2>
                        <div id="bio-content" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<section id="paintings" class="py-5">
    <div class="container">
        <h2 class="title mb-4" data-t="nav_paintings">Paintings</h2>
        <div class="gallery-scroll-container">
            <div id="paintings-grid"></div>
        </div>
    </div>
</section>

<section id="sculptures" class="py-5 bg-light">
    <div class="container">
        <h2 class="title mb-4" data-t="nav_sculptures">Sculptures</h2>
        <div class="gallery-scroll-container">
            <div id="sculptures-grid"></div>
        </div>
    </div>
</section>

<section id="exhibitions" class="py-5">
    <div class="container">
        <div class="card yellow-card">
            <div class="card-body">
                <h2 class="title mb-4" data-t="nav_exhibitions">Exhibitions</h2>
                <div class="accordion accordion-flush" id="exhibitionAccordion">
                    <div class="accordion-item bg-transparent">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed bg-transparent title fs-4 px-0" type="button" data-bs-toggle="collapse" data-bs-target="#collapseSolo" aria-expanded="false" data-t="solo_title">
                                Solo Exhibitions
                            </button>
                        </h2>
                        <div id="collapseSolo" class="accordion-collapse collapse" data-bs-parent="#exhibitionAccordion">
                            <div class="accordion-body px-0 text" id="solo-list"></div>
                        </div>
                    </div>
                    <div class="accordion-item bg-transparent">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed bg-transparent title fs-4 px-0" type="button" data-bs-toggle="collapse" data-bs-target="#collapseMajor" aria-expanded="false" data-t="major_title">
                                Major Exhibitions
                            </button>
                        </h2>
                        <div id="collapseMajor" class="accordion-collapse collapse" data-bs-parent="#exhibitionAccordion">
                            <div class="accordion-body px-0 text" id="major-list"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<section id="awards" class="py-5">
    <div class="container">
        <div class="card yellow-card">
            <div class="card-body">
                <h2 class="title mb-4" data-t="nav_awards">Awards</h2>
                <div id="awards-list" class="row g-4"></div>
            </div>
        </div>
    </div>
</section>

<section id="contacts" class="pb-5">
    <div class="container">
        <div class="card yellow-card">
            <div class="card-body">
                <h2 class="title mb-4" data-t="nav_contacts">Contacts</h2>
                <h3 class="title fs-5" data-t="located_title">Works are located:</h3>
                <div id="located-list" class="text mt-3 row"></div>
            </div>
        </div>
    </div>
</section>

<footer class="py-4">
    <div class="container text-center">
        <p class="m-0 mb-2" id="footer-copy"></p>
        <p class="m-0 text-muted small" data-t="footer_disclaimer"></p>
    </div>
</footer>

<div class="modal fade" id="galleryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen modal-dialog-centered">
        <div class="modal-content bg-dark border-0">
            <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-4 fs-4" data-bs-dismiss="modal" style="z-index: 1080;"></button>
            <div class="modal-body p-0 d-flex flex-column justify-content-center align-items-center">
                <div id="carouselGallery" class="carousel slide w-100 h-100">
                    <div class="carousel-inner h-100" id="carousel-items-container"></div>
                    <button class="carousel-control-prev custom-nav-btn" data-bs-target="#carouselGallery" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button>
                    <button class="carousel-control-next custom-nav-btn" data-bs-target="#carouselGallery" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
